<script type="application/ld+json" class="yoros-graph">
    {
        "@context": "https://schema.org",
        "@graph": [{
            "@type": "WebSite",
            "@id": {{ .Permalink | absURL  }},
            "url": {{ .Permalink | absURL }},
            "name": "{{ htmlEscape .Title }}",
            "author": {
                "@type": "Person",
                "name": "{{ htmlEscape .Site.Params.author }}"
            },
            "description": {{ .Page.Description | safeJS }},
            "potentialAction": [{
                "@type": "SearchAction",
                "target": "https://neilpatel.com/?s={search_term_string}",
                "query-input": "required name=search_term_string"
            }],
            "inLanguage": "{{ .Site.LanguageCode }}"
        }, {
            "@type": "WebPage",
            "@id": {{ .Site.BaseURL }},
            "url": {{ .Permalink | safeURL}},
            "name": "{{ htmlEscape .Title }}",
            "author": {
                "@type": "Person",
                "name": "{{ htmlEscape .Site.Params.author | safeJS }}"
            },
            "isPartOf": {
                "@id": {{ .Permalink | safeURL}}
            },
            "datePublished": "2015-11-18T20:12:54+00:00",
            "dateModified": "2020-06-25T16:05:08+00:00",
            "description": {{ .Page.Description | safeJS }},
            "inLanguage": "{{ $.Site.LanguageCode }}",
            "potentialAction": [{
                "@type": "ReadAction",
                "target": [{{ .Site.BaseURL }}]
            }]
        }]
    }
    </script>
